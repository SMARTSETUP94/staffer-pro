# v0.34 — Workflow E2E Playwright.
#
# Déclenchement : push sur main + workflow_dispatch.
# Stratégie : 4 shards parallèles (cible <15 min) → blob reports → merge HTML.
#
# Artefacts :
#   - playwright-blob-shard-N    : blob brut par shard (mergeable)
#   - playwright-traces-shard-N  : traces/screenshots/vidéos sur échec
#   - playwright-report          : rapport HTML CONSOLIDÉ (job merge)
#
# Secrets requis (Settings → Secrets and variables → Actions) :
#   E2E_BASE_URL              # ex https://staffer-pro.lovable.app
#   E2E_ADMIN_EMAIL / E2E_ADMIN_PASSWORD
#   E2E_CHEF_EMAIL  / E2E_CHEF_PASSWORD
#   E2E_EMPLOYE_EMAIL / E2E_EMPLOYE_PASSWORD

name: E2E (Playwright)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    name: Shard ${{ matrix.shard }}/4
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Install Playwright (chromium only)
        run: |
          bun add -D @playwright/test
          bunx playwright install --with-deps chromium

      - name: Run E2E tests (shard ${{ matrix.shard }}/4)
        env:
          CI: "true"
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_CHEF_EMAIL: ${{ secrets.E2E_CHEF_EMAIL }}
          E2E_CHEF_PASSWORD: ${{ secrets.E2E_CHEF_PASSWORD }}
          E2E_EMPLOYE_EMAIL: ${{ secrets.E2E_EMPLOYE_EMAIL }}
          E2E_EMPLOYE_PASSWORD: ${{ secrets.E2E_EMPLOYE_PASSWORD }}
        run: bunx playwright test --shard=${{ matrix.shard }}/4

      # Blob report : nécessaire pour le merge cross-shards.
      - name: Upload blob report (shard ${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-blob-shard-${{ matrix.shard }}
          path: blob-report/
          retention-days: 7

      # Artefacts bruts (traces/screenshots/vidéos) : utiles pour debug local.
      - name: Upload raw traces & screenshots (shard ${{ matrix.shard }})
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

  merge-reports:
    name: Merge HTML report
    if: always()
    needs: [e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Playwright (merge only needs the package)
        run: bun add -D @playwright/test

      - name: Download blob reports from all shards
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: playwright-blob-shard-*
          merge-multiple: true

      - name: Merge into single HTML report
        run: bunx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload consolidated HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Summarize report location
        run: |
          echo "### 📊 Playwright HTML Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Téléchargez l'artefact **playwright-report** ci-dessus, puis :" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "unzip playwright-report.zip -d playwright-report" >> $GITHUB_STEP_SUMMARY
          echo "bunx playwright show-report playwright-report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
